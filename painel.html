<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel do Representante</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>CONSELHO DE REPRESENTANTES</h1>
<p>Painel do Representante</p>
</header>

<nav>
<a href="index.html">Portal</a>
<a onclick="logout()">Sair</a>
</nav>

<div class="container">

<h2>Nova Publicação</h2>

<p>Tipo de Documento:</p>
<select id="tipo">
<option value="diretriz">Diretriz</option>
<option value="carta">Carta Normativa</option>
<option value="aie">Ato Institucional Escolar (AIE)</option>
<option value="indicium">Indicium</option>
<option value="analise">Análise do Conselho</option>
</select>

<p>Título:</p>
<input id="titulo" type="text" placeholder="Título do documento" style="width:100%; padding:10px;">

<p>Texto Oficial:</p>
<textarea id="texto" placeholder="Redija o documento completo..." style="width:100%; height:200px; padding:10px;"></textarea>

<br><br>

<button onclick="publicar(false)">Publicar Documento</button>

</div>

<script type="module" src="script.js"></script>

<script>
// LOGOUT SIMPLES
function logout() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
